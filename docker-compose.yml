services:
  chromadb:
    image: chromadb/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "8100:8000"
    volumes:
      - chromadb:/chroma/chroma
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      chromadb:
        condition: service_started
    ports:
      - "8001:8000"
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  chromadb:
